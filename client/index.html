<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Human or Not</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="particles-canvas" aria-hidden="true"></canvas>
    <main class="game-container">
      <section id="start-screen" class="card start-screen">
        <div class="start-toolbar">
          <button id="historyToggleBtn" class="tool-btn history-btn is-active icon-active" type="button" aria-label="История">
            <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 18 0 9 9 0 1 0 -18 0"/>
              <path d="M12 12h3.5"/>
              <path d="M12 7v5"/>
            </svg>
          </button>
          <div class="tool-actions">
            <button id="soundToggleBtn" class="tool-btn is-active icon-active" type="button" aria-label="Звук">
              <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 8a5 5 0 0 1 0 8"/>
                <path d="M17.7 5a9 9 0 0 1 0 14"/>
                <path d="M6 15h-2a1 1 0 0 1 -1 -1v-4a1 1 0 0 1 1 -1h2l3.5 -4.5a.8.8 0 0 1 1.5 .5v14a.8.8 0 0 1 -1.5 .5l-3.5 -4.5"/>
              </svg>
            </button>
          </div>
        </div>

        <div class="start-info">
          <span class="start-logo">
            <svg class="start-logo-svg" xmlns="http://www.w3.org/2000/svg" width="492" height="506" viewBox="0 0 492 506">
              <g transform="translate(0,506) scale(0.1,-0.1)" fill="none" stroke="#4ADE80" stroke-width="45" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1910 4519 c-202 -19 -383 -67 -556 -149 -253 -118 -483 -339 -604 -580 -124 -246 -179 -549 -135 -744 35 -156 9 -227 -189 -519 -67 -98 -129 -191 -140 -207 -36 -59 -1 -108 105 -150 98 -37 136 -66 155 -116 19 -51 15 -95 -17 -172 -12 -28 -19 -58 -16 -66 3 -8 24 -24 46 -36 37 -18 61 -45 61 -68 0 -5 -16 -30 -37 -56 l-36 -47 35 -37 c71 -74 88 -140 64 -245 -22 -95 -20 -145 7 -189 62 -101 162 -130 362 -102 219 29 238 31 289 22 134 -25 211 -117 271 -323 35 -122 46 -146 72 -156 14 -5 131 -8 267 -7 l241 3 3 1978 2 1977 -77 -1 c-43 -1 -121 -6 -173 -10z"/>
                <path d="M2526 4523 c-17 -5 -18 -12 -12 -81 3 -41 6 -131 6 -199 l0 -123 243 0 244 0 12 43 c6 23 37 111 68 196 46 125 53 155 42 162 -14 9 -567 10 -603 2z"/>
                <path d="M3177 4302 c-32 -92 -62 -179 -66 -194 -9 -25 1 -37 161 -195 93 -92 176 -180 184 -195 11 -21 14 -72 14 -223 0 -195 0 -196 25 -221 l24 -24 263 2 262 3 3 215 3 215 -173 170 c-295 293 -629 615 -636 615 -3 0 -32 -75 -64 -168z"/>
                <path d="M2683 4013 l-163 -3 0 -69 0 -68 113 -6 c61 -4 147 -7 189 -7 68 0 79 -2 88 -21 16 -29 4 -68 -23 -74 -12 -3 -98 -6 -192 -7 l-170 -3 -8 -170 c-6 -118 -3 -1508 3 -1552 0 -2 125 -3 278 -3 240 0 281 2 302 16 14 9 135 126 270 260 159 158 258 249 282 259 29 11 78 15 212 15 207 0 188 -18 184 170 l-3 125 -145 5 -145 5 -9 27 c-8 22 -6 32 9 48 16 18 30 20 152 20 120 0 133 2 134 18 1 16 1 129 -1 145 0 4 -119 7 -265 7 -284 0 -296 2 -353 54 -56 50 -62 93 -62 462 0 13 -6 20 -197 207 l-150 147 -84 -2 c-46 -1 -157 -4 -246 -5z"/>
                <path d="M4151 2663 c0 -269 3 -503 7 -521 l7 -32 105 52 c149 76 140 45 140 468 0 424 9 393 -140 467 -58 29 -108 52 -112 53 -4 0 -7 -219 -7 -487z"/>
                <path d="M3419 2211 c-185 -180 -276 -262 -300 -269 -19 -6 -161 -14 -316 -18 l-283 -7 0 -26 c0 -14 -1 -136 -2 -271 l-3 -245 270 -5 c149 -3 271 -7 271 -8 12 -19 37 -110 99 -367 88 -360 85 -347 94 -343 18 7 212 243 215 262 3 11 10 185 16 386 7 201 15 370 19 376 7 14 147 180 326 388 229 265 213 242 215 316 1 36 2 71 1 78 -1 9 -44 12 -178 12 l-178 -1 -266 -258z"/>
                <path d="M3995 2094 c-21 -25 -46 -54 -57 -64 -10 -9 -29 -31 -41 -48 -13 -16 -59 -70 -104 -119 -44 -48 -108 -120 -141 -160 l-60 -72 -7 -233 c-4 -128 -5 -262 -3 -297 l3 -65 99 120 c55 65 116 137 135 159 58 66 132 154 183 216 l47 59 -6 272 c-3 150 -7 274 -8 276 -1 1 -19 -18 -40 -44z"/>
                <path d="M2518 1148 c-1 -62 -2 -215 -3 -340 0 -190 2 -229 14 -233 20 -8 597 -4 609 4 6 4 -10 89 -43 226 -29 121 -65 273 -80 338 l-27 117 -234 0 -234 0 -2 -112z"/>
              </g>
            </svg>
          </span>
          <h1 class="game-title">Человек или нет?</h1>
          <p class="tagline">
            Кто перед вами — живой человек или искусственный интеллект?
          </p>
        </div>

        <div class="mode-cards" role="radiogroup" aria-label="Режим чата">
          <button
            id="safeModeBtn"
            class="mode-card is-selected"
            type="button"
            role="radio"
            aria-checked="true"
          >
            <span class="mode-shield safe">
              <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a12 12 0 0 0 8.5 3 12 12 0 0 1 -8.5 15 12 12 0 0 1 -8.5 -15 12 12 0 0 0 8.5 -3"/>
              </svg>
            </span>
            <span class="mode-text">
              <strong>Безопасный чат</strong>
              <small>Чат и Угадай</small>
            </span>
          </button>
          <button
            id="freeModeBtn"
            class="mode-card"
            type="button"
            role="radio"
            aria-checked="false"
          >
            <span class="mode-shield free">
              <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a12 12 0 0 0 8.5 3 12 12 0 0 1 -8.5 15 12 12 0 0 1 -8.5 -15 12 12 0 0 0 8.5 -3"/>
              </svg>
            </span>
            <span class="mode-text">
              <strong>Свободный чат</strong>
              <small>Без ограничений</small>
            </span>
          </button>
        </div>

        <div class="language-pill" aria-hidden="true">
          <span>🇷🇺 Русский</span>
          <span class="icon-active" aria-hidden="true">
            <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 18v-3"/>
              <path d="M10 18v-6"/>
              <path d="M14 18v-9"/>
              <path d="M18 18v-12"/>
            </svg>
          </span>
        </div>

        <button id="playBtn" class="primary-btn" type="button">Начать игру</button>
      </section>

      <section id="game-screen" class="card game-screen">
        <div class="chat-header">
          <h2>Human or Not</h2>
          <div class="menu-wrap">
            <button id="menuBtn" class="menu-btn" type="button">⋮</button>
            <div id="chatMenu" class="chat-menu">
              <button id="endChatBtn" type="button">Завершить чат</button>
              <button id="backToStartBtn" type="button">К началу</button>
              <div class="menu-divider"></div>
              <button id="reportBtn" class="danger-item" type="button">Пожаловаться</button>
            </div>
          </div>
        </div>
        <p id="status" class="status">Подключение к серверу...</p>
        <div id="search-indicator" class="search-indicator" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <button id="cancelSearchBtn" class="cancel-search-btn" type="button">Отмена</button>
        <div class="actions">
          <button id="findMatchBtn" type="button">Найти игру</button>
        </div>

        <div id="chat-container">
          <p id="timer" class="timer">02:00</p>
          <div id="messages"></div>
          <div id="typing-indicator" class="typing-indicator">
            Собеседник печатает
            <span class="typing-dots" aria-hidden="true"><span></span><span></span><span></span></span>
          </div>
          <div id="input-area">
            <input
              id="messageInput"
              type="text"
              placeholder="Введите сообщение..."
              autocomplete="off"
            />
            <button id="sendBtn" type="button">Отправить</button>
          </div>
          <div id="vote-area">
            <button id="voteHumanBtn" class="vote-card human" type="button">
              <span class="vote-emoji icon-inactive" aria-hidden="true">
                <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10 16v5"/>
                  <path d="M14 16v5"/>
                  <path d="M9 9h6l-1 7h-4l-1 -7"/>
                  <path d="M5 11c1.333 -1.333 2.667 -2 4 -2"/>
                  <path d="M19 11c-1.333 -1.333 -2.667 -2 -4 -2"/>
                  <path d="M10 4a2 2 0 1 0 4 0 2 2 0 1 0 -4 0"/>
                </svg>
              </span>
              <span class="vote-label">Человек</span>
            </button>
            <button id="voteBotBtn" class="vote-card bot" type="button">
              <span class="vote-emoji icon-inactive" aria-hidden="true">
                <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M6 6a2 2 0 0 1 2 -2h8a2 2 0 0 1 2 2v4a2 2 0 0 1 -2 2h-8a2 2 0 0 1 -2 -2V6"/>
                  <path d="M12 2v2"/>
                  <path d="M9 12v9"/>
                  <path d="M15 12v9"/>
                  <path d="M5 16l4 -2"/>
                  <path d="M15 14l4 2"/>
                  <path d="M9 18h6"/>
                  <path d="M10 8v.01"/>
                  <path d="M14 8v.01"/>
                </svg>
              </span>
              <span class="vote-label">Бот</span>
            </button>
          </div>
          <p id="vote-status" class="vote-status"></p>

          <div id="result-card" class="result-card">
            <div id="result-icon" class="result-icon" aria-hidden="true">
              <svg class="ui-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M10 16v5"/>
                <path d="M14 16v5"/>
                <path d="M9 9h6l-1 7h-4l-1 -7"/>
                <path d="M5 11c1.333 -1.333 2.667 -2 4 -2"/>
                <path d="M19 11c-1.333 -1.333 -2.667 -2 -4 -2"/>
                <path d="M10 4a2 2 0 1 0 4 0 2 2 0 1 0 -4 0"/>
              </svg>
            </div>
            <p id="result" class="result"></p>
            <p id="result-opponent-vote" class="result-opponent-vote"></p>
            <button id="playAgainBtn" type="button">Играть снова</button>
          </div>
        </div>
      </section>
    </main>

    <div id="report-modal-overlay" class="modal-overlay">
      <div id="report-modal" class="modal-card">
        <h3>Пожаловаться на игрока</h3>
        <p class="modal-text">
          Вы уверены, что хотите пожаловаться на этого игрока? Это заблокирует его в
          ваших будущих матчах.
        </p>
        <label for="reportReason" class="modal-label">Причина жалобы (необязательно):</label>
        <textarea
          id="reportReason"
          maxlength="500"
          placeholder="Опишите причину жалобы..."
        ></textarea>
        <p id="reportCounter" class="report-counter">0/500</p>
        <div class="modal-actions">
          <button id="cancelReportBtn" class="secondary-btn" type="button">Отмена</button>
          <button id="submitReportBtn" class="danger-btn" type="button">Отправить жалобу</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
